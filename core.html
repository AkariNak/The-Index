<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Onyx — Stats</title>
<link rel="icon" type="image/png" href="favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.stats-page { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
.stats-hero { margin-bottom: 32px; }
.stats-hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
.stats-hero p { color: var(--ink-mute); font-size: 14px; }
.stats-totals { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }
.stats-total-card { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 20px; }
.stats-total-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.stats-total-value { font-size: 24px; font-weight: 800; color: var(--ink); }
.stats-total-sub { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
.stats-section-head { font-size: 13px; font-weight: 700; color: var(--ink); margin: 28px 0 12px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.stats-user { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.stats-user-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; transition: background .15s; }
.stats-user-header:hover { background: var(--paper-3); }
.stats-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--paper-3); border: 1px solid var(--line); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--ink-mute); }
.stats-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.stats-user-name { font-weight: 600; font-size: 14px; flex: 1; }
.stats-user-total { font-size: 13px; color: var(--ink-mute); margin-right: 8px; }
.stats-user-chevron { color: var(--ink-mute); font-size: 12px; transition: transform .2s; }
.stats-user-chevron.open { transform: rotate(180deg); }
.stats-user-body { display: none; border-top: 1px solid var(--line); }
.stats-user-body.open { display: block; }
.stats-show-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--line-soft); }
.stats-show-row:last-child { border-bottom: none; }
.stats-show-cover { width: 32px; aspect-ratio: 2/3; border-radius: 3px; object-fit: cover; background: var(--paper-3); flex-shrink: 0; }
.stats-show-title { flex: 1; font-size: 13px; font-weight: 500; }
.stats-show-bar-wrap { width: 120px; height: 4px; background: var(--paper-3); border-radius: 2px; flex-shrink: 0; }
.stats-show-bar { height: 100%; border-radius: 2px; background: var(--accent); }
.stats-show-time { font-size: 12px; color: var(--ink-mute); min-width: 70px; text-align: right; font-family: var(--mono); }
.stats-guest-badge { font-size: 10px; color: var(--ink-mute); background: var(--paper-3); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; flex-shrink: 0; }
.stats-empty { text-align: center; color: var(--ink-mute); padding: 48px 20px; font-size: 14px; }
.stats-loading { text-align: center; color: var(--ink-mute); padding: 48px 20px; }
.stats-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.stats-tab { font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--line); background: transparent; color: var(--ink-mute); transition: all .15s; }
.stats-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Activity heatmap — hacker green */
.heatmap-wrap { background: #0a0e0a; border: 1px solid #1a3a1a; border-radius: var(--radius); padding: 16px; margin-bottom: 24px; }
.heatmap-scroll { overflow-x: auto; padding-bottom: 4px; }
.heatmap-months { display: flex; gap: 3px; margin-bottom: 4px; padding-left: 0; min-width: max-content; }
.heatmap-month-label { font-family: var(--mono); font-size: 9px; color: #4ade80; opacity: .7; width: 14px; text-align: left; }
.heatmap-grid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 11px); gap: 3px; min-width: max-content; }
.heatmap-cell { width: 11px; height: 11px; border-radius: 2px; background: #0d1f0d; cursor: pointer; transition: outline .1s; }
.heatmap-cell[data-level="0"] { background: #0d1f0d; }
.heatmap-cell[data-level="1"] { background: #14391a; }
.heatmap-cell[data-level="2"] { background: #1f6b2a; }
.heatmap-cell[data-level="3"] { background: #2ea043; }
.heatmap-cell[data-level="4"] { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
.heatmap-cell:hover { outline: 1px solid #4ade80; }
.heatmap-legend { display: flex; align-items: center; gap: 5px; margin-top: 10px; font-family: var(--mono); font-size: 10px; color: #4ade80; opacity: .8; }
.heatmap-legend .heatmap-cell { cursor: default; width: 10px; height: 10px; }
.heatmap-tooltip { position: fixed; background: #0a0e0a; border: 1px solid #2ea043; color: #4ade80; font-family: var(--mono); font-size: 11px; padding: 6px 10px; border-radius: 4px; pointer-events: none; z-index: 999; display: none; white-space: nowrap; }

.activity-toggle { display: flex; gap: 6px; }
.activity-toggle-btn { font-family: var(--mono); font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--line); background: transparent; color: var(--ink-mute); cursor: pointer; transition: all .15s; }
.activity-toggle-btn.active { background: #14391a; border-color: #2ea043; color: #4ade80; }
.activity-toggle-btn:hover:not(.active) { border-color: var(--ink-mute); }

.heatmap-line-view { padding: 8px 4px 0; }
.heatmap-line-path { fill: none; stroke: #4ade80; stroke-width: 2; filter: drop-shadow(0 0 3px rgba(74,222,128,0.6)); }
.heatmap-line-area { fill: url(#lineGradient); opacity: .5; }
.heatmap-line-dot { fill: #4ade80; cursor: pointer; }
.heatmap-line-dot:hover { fill: #fff; }
.heatmap-line-axis-label { font-family: var(--mono); font-size: 9px; fill: #4ade80; opacity: .6; }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="index.html" aria-label="Onyx home">

<main class="stats-page" id="statsMain">
  <div class="stats-hero">
    <h1>Watch Stats</h1>
    <p>Time spent watching across all users — including guests.</p>
  </div>

  <div class="stats-totals" id="statsTotals">
    <div class="stats-total-card"><div class="stats-total-label">Total Watch Time</div><div class="stats-total-value" id="totalTime">—</div></div>
    <div class="stats-total-card"><div class="stats-total-label">Registered Users</div><div class="stats-total-value" id="totalUsers">—</div></div>
    <div class="stats-total-card"><div class="stats-total-label">Guest Sessions</div><div class="stats-total-value" id="totalGuests">—</div></div>
    <div class="stats-total-card"><div class="stats-total-label">Shows Completed</div><div class="stats-total-value" id="totalShows">—</div></div>
    <div class="stats-total-card"><div class="stats-total-label">Episodes Watched</div><div class="stats-total-value" id="totalEps">—</div></div>
  </div>

  <div class="stats-section-head" style="margin-top:8px;display:flex;align-items:center;justify-content:space-between">
    <span>Activity</span>
    <div class="activity-toggle">
      <button class="activity-toggle-btn active" data-view="grid" onclick="setActivityView(this)" type="button">⊞ Grid</button>
      <button class="activity-toggle-btn" data-view="line" onclick="setActivityView(this)" type="button">⟍ Line</button>
    </div>
  </div>
  <div class="heatmap-wrap">
    <div class="heatmap-scroll" id="heatmapGridView">
      <div class="heatmap-months" id="heatmapMonths"></div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
    <div class="heatmap-legend" id="heatmapLegend">
      <span>Less</span>
      <div class="heatmap-cell" data-level="0"></div>
      <div class="heatmap-cell" data-level="1"></div>
      <div class="heatmap-cell" data-level="2"></div>
      <div class="heatmap-cell" data-level="3"></div>
      <div class="heatmap-cell" data-level="4"></div>
      <span>More</span>
    </div>
    <div class="heatmap-line-view" id="heatmapLineView" style="display:none">
      <svg id="heatmapLineSvg" width="100%" height="160" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div class="stats-tabs">
    <button class="stats-tab active" data-tab="users" onclick="switchTab(this)">By User</button>
    <button class="stats-tab" data-tab="shows" onclick="switchTab(this)">By Show</button>
  </div>

  <div id="tabUsers">
    <div class="stats-section-head">Registered Users</div>
    <div id="usersList"><div class="stats-loading">Loading...</div></div>
    <div class="stats-section-head" style="margin-top:32px">Guests</div>
    <div id="guestsList"><div class="stats-loading">Loading...</div></div>
  </div>

  <div id="tabShows" style="display:none">
    <div class="stats-section-head">Most Watched Shows (All Users)</div>
    <div id="showsList"><div class="stats-loading">Loading...</div></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="core.js"></script>
<script>
function getSB() { return getSupabase(); }

function formatTime(seconds) {
  if (!seconds || seconds < 60) return `${seconds || 0}s`;
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function switchTab(btn) {
  document.querySelectorAll('.stats-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabUsers').style.display = btn.dataset.tab === 'users' ? '' : 'none';
  document.getElementById('tabShows').style.display = btn.dataset.tab === 'shows' ? '' : 'none';
}

function buildUserRow(name, isGuest, totalSeconds, shows, avatarUrl, totalEps, completedShows) {
  const id = 'u-' + Math.random().toString(36).slice(2);
  const maxSec = Math.max(...shows.map(s => s.seconds), 1);
  const initial = (name || '?').charAt(0).toUpperCase();
  const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" alt="">` : initial;

  const showRows = shows.map(s => `
    <div class="stats-show-row">
      ${s.cover ? `<img class="stats-show-cover" src="${s.cover}" alt="">` : `<div class="stats-show-cover"></div>`}
      <div class="stats-show-title">${s.collection}${s.completed ? ' <span style="color:#f59e0b;font-size:11px">✓ Completed</span>' : ''}</div>
      <div style="font-size:11px;color:var(--ink-mute);font-family:var(--mono);white-space:nowrap;margin-right:8px">${s.epsWatched}${s.totalEps ? '/' + s.totalEps : ''} eps</div>
      <div class="stats-show-bar-wrap"><div class="stats-show-bar" style="width:${Math.round((s.seconds/maxSec)*100)}%"></div></div>
      <div class="stats-show-time">${formatTime(s.seconds)}</div>
    </div>
  `).join('');

  const meta = [
    formatTime(totalSeconds),
    totalEps != null ? `${totalEps} eps watched` : '',
    completedShows != null ? `${completedShows} shows completed` : ''
  ].filter(Boolean).join(' · ');

  return `
    <div class="stats-user">
      <div class="stats-user-header" onclick="toggleRow('${id}')">
        <div class="stats-user-avatar">${avatarHtml}</div>
        <div class="stats-user-name">${name}</div>
        ${isGuest ? '<span class="stats-guest-badge">Guest</span>' : ''}
        <div class="stats-user-total">${meta}</div>
        <div class="stats-user-chevron" id="chev-${id}">▾</div>
      </div>
      <div class="stats-user-body" id="${id}">
        ${showRows || '<div style="padding:12px 16px;color:var(--ink-mute);font-size:13px">No show data</div>'}
      </div>
    </div>
  `;
}

function toggleRow(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

async function loadStats() {
  const sb = getSB();

  // Fetch all analytics rows
  const { data, error } = await sb
    .from('watch_analytics')
    .select('*')
    .order('watch_seconds', { ascending: false });

  console.log('[Stats] data:', data?.length, 'error:', error);

  if (error || !data) {
    document.getElementById('usersList').innerHTML = `<div class="stats-empty">Could not load stats: ${error?.message || 'unknown error'}</div>`;
    document.getElementById('guestsList').innerHTML = '';
    return;
  }

  // Fetch episodes_watched
  const { data: epData } = await sb.from('episodes_watched').select('*');
  const epRows = epData || [];

  // Build episode counts per session+collection
  const epCountMap = {}; // key: sessionId -> collection -> count
  const showCompletedMap = {}; // key: sessionId -> Set of completed collections
  for (const row of epRows) {
    const key = row.session_id;
    if (!epCountMap[key]) epCountMap[key] = {};
    if (!epCountMap[key][row.collection]) epCountMap[key][row.collection] = 0;
    epCountMap[key][row.collection]++;
  }

  // Fetch total episode counts per collection from videos table
  const collections = [...new Set([...data.map(r => r.collection), ...epRows.map(r => r.collection)])];
  const coverMap = {};
  const totalEpMap = {}; // collection -> total episodes
  if (collections.length) {
    const { data: videos } = await sb
      .from('videos')
      .select('collection, cover_url')
      .in('collection', collections);
    for (const v of (videos || [])) {
      if (!coverMap[v.collection] && v.cover_url) coverMap[v.collection] = v.cover_url;
    }
    // Count total episodes per collection
    const { data: epCounts } = await sb
      .from('videos')
      .select('collection')
      .in('collection', collections)
      .eq('void', false);
    for (const v of (epCounts || [])) {
      totalEpMap[v.collection] = (totalEpMap[v.collection] || 0) + 1;
    }
  }

  // Determine show completions — all episodes watched for that session
  for (const [sessionId, colMap] of Object.entries(epCountMap)) {
    showCompletedMap[sessionId] = new Set();
    for (const [col, count] of Object.entries(colMap)) {
      const total = totalEpMap[col] || 0;
      if (total > 0 && count >= total) showCompletedMap[sessionId].add(col);
    }
  }

  // Fetch user profiles
  const userIds = [...new Set(data.filter(r => r.user_id).map(r => r.user_id))];
  const profileMap = {};
  if (userIds.length) {
    const { data: profiles } = await sb
      .from('user_profiles')
      .select('id, username, avatar_url')
      .in('id', userIds);
    for (const p of (profiles || [])) profileMap[p.id] = p;
  }

  if (!data.length) {
    document.getElementById('usersList').innerHTML = '<div class="stats-empty">No watch data yet — start watching to see stats appear.</div>';
    document.getElementById('guestsList').innerHTML = '';
    document.getElementById('showsList').innerHTML = '<div class="stats-empty">No data yet.</div>';
    document.getElementById('totalTime').textContent = '0m';
    document.getElementById('totalUsers').textContent = '0';
    document.getElementById('totalGuests').textContent = '0';
    document.getElementById('totalShows').textContent = '0';
    return;
  }

  // Group by user/session — use user_id as the key when available so the
  // same logged-in account never splits into multiple rows across sessions
  const userMap = {};
  for (const row of data) {
    const key = row.user_id || row.session_id;
    if (!userMap[key]) userMap[key] = { key, userId: row.user_id, sessionIds: new Set(), isGuest: row.is_guest, username: row.username, shows: {}, total: 0 };
    userMap[key].sessionIds.add(row.session_id);
    if (!userMap[key].shows[row.collection]) userMap[key].shows[row.collection] = 0;
    userMap[key].shows[row.collection] += row.watch_seconds;
    userMap[key].total += row.watch_seconds;
  }

  const users = Object.values(userMap).sort((a, b) => b.total - a.total);
  const registered = users.filter(u => !u.isGuest);
  const guests = users.filter(u => u.isGuest);

  // Totals
  const totalSeconds = data.reduce((s, r) => s + r.watch_seconds, 0);
  const totalEpsWatched = epRows.length;
  const totalShowsCompleted = Object.values(showCompletedMap).reduce((sum, set) => sum + set.size, 0);
  document.getElementById('totalTime').textContent = formatTime(totalSeconds);
  document.getElementById('totalUsers').textContent = registered.length;
  document.getElementById('totalGuests').textContent = guests.length;
  document.getElementById('totalShows').textContent = totalShowsCompleted;
  document.getElementById('totalEps').textContent = totalEpsWatched;

  function renderUserList(list, el) {
    if (!list.length) { el.innerHTML = '<div class="stats-empty">No data yet.</div>'; return; }
    el.innerHTML = list.map(u => {
      const profile = u.userId ? profileMap[u.userId] : null;
      const name = profile?.username || u.username || 'Unknown';
      const avatar = profile?.avatar_url || null;
      // Merge episode counts and completed shows across every session this user has had
      const epsByCol = {};
      const completed = new Set();
      for (const sid of u.sessionIds) {
        const sidEps = epCountMap[sid] || {};
        for (const [col, count] of Object.entries(sidEps)) {
          epsByCol[col] = (epsByCol[col] || 0) + count;
        }
        const sidCompleted = showCompletedMap[sid];
        if (sidCompleted) for (const col of sidCompleted) completed.add(col);
      }
      const totalUserEps = Object.values(epsByCol).reduce((s, c) => s + c, 0);
      const shows = Object.entries(u.shows)
        .map(([collection, seconds]) => ({
          collection, seconds,
          cover: coverMap[collection] || '',
          epsWatched: epsByCol[collection] || 0,
          totalEps: totalEpMap[collection] || 0,
          completed: completed.has(collection)
        }))
        .sort((a, b) => b.seconds - a.seconds);
      return buildUserRow(name, u.isGuest, u.total, shows, avatar, totalUserEps, completed.size);
    }).join('');
  }

  renderUserList(registered, document.getElementById('usersList'));
  renderUserList(guests, document.getElementById('guestsList'));

  // By show
  const showTotals = {};
  for (const row of data) {
    if (!showTotals[row.collection]) showTotals[row.collection] = { seconds: 0, eps: 0 };
    showTotals[row.collection].seconds += row.watch_seconds;
  }
  for (const row of epRows) {
    if (!showTotals[row.collection]) showTotals[row.collection] = { seconds: 0, eps: 0 };
    showTotals[row.collection].eps++;
  }
  const sortedShows = Object.entries(showTotals).sort((a, b) => b[1].seconds - a[1].seconds);
  const maxShowSec = sortedShows[0]?.[1].seconds || 1;
  document.getElementById('showsList').innerHTML = sortedShows.map(([collection, { seconds, eps }]) => `
    <div class="stats-show-row">
      ${coverMap[collection] ? `<img class="stats-show-cover" src="${coverMap[collection]}" alt="">` : `<div class="stats-show-cover"></div>`}
      <div class="stats-show-title">${collection}</div>
      <div class="stats-show-eps" style="font-size:11px;color:var(--ink-mute);font-family:var(--mono);white-space:nowrap">${eps} ep${eps !== 1 ? 's' : ''}</div>
      <div class="stats-show-bar-wrap"><div class="stats-show-bar" style="width:${Math.round((seconds/maxShowSec)*100)}%"></div></div>
      <div class="stats-show-time">${formatTime(seconds)}</div>
    </div>
  `).join('') || '<div class="stats-empty">No data yet.</div>';

  buildHeatmap(data);
}

function buildHeatmap(rows) {
  // Aggregate watch_seconds by day (using updated_at as the activity date)
  const dayTotals = {};
  for (const row of rows) {
    const d = new Date(row.updated_at || row.created_at);
    if (isNaN(d.getTime())) continue;
    const key = d.toISOString().slice(0, 10);
    dayTotals[key] = (dayTotals[key] || 0) + (row.watch_seconds || 0);
  }

  // Build last 365 days, ending today, starting on a Sunday
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const start = new Date(today);
  start.setDate(start.getDate() - 364);
  // Roll back to the most recent Sunday on or before start
  start.setDate(start.getDate() - start.getDay());

  const days = [];
  const cursor = new Date(start);
  while (cursor <= today) {
    const key = cursor.toISOString().slice(0, 10);
    days.push({ date: new Date(cursor), key, seconds: dayTotals[key] || 0 });
    cursor.setDate(cursor.getDate() + 1);
  }

  const maxSeconds = Math.max(...days.map(d => d.seconds), 1);
  function levelFor(seconds) {
    if (seconds <= 0) return 0;
    const pct = seconds / maxSeconds;
    if (pct > 0.75) return 4;
    if (pct > 0.5) return 3;
    if (pct > 0.2) return 2;
    return 1;
  }

  // Render grid (columns = weeks, rows = days Sun-Sat)
  const grid = document.getElementById('heatmapGrid');
  const monthsEl = document.getElementById('heatmapMonths');
  if (!grid) return;

  let html = '';
  let lastMonth = null;
  const monthLabels = [];
  for (let i = 0; i < days.length; i++) {
    const day = days[i];
    if (i % 7 === 0) {
      const m = day.date.getMonth();
      if (m !== lastMonth) { monthLabels.push(day.date.toLocaleDateString('en-US', { month: 'short' })); lastMonth = m; }
      else monthLabels.push('');
    }
    const level = levelFor(day.seconds);
    const dateLabel = day.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    html += `<div class="heatmap-cell" data-level="${level}" data-date="${dateLabel}" data-seconds="${day.seconds}"></div>`;
  }
  grid.innerHTML = html;
  monthsEl.innerHTML = monthLabels.map(m => `<span class="heatmap-month-label">${m}</span>`).join('');

  // Tooltip
  let tip = document.getElementById('heatmapTooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'heatmapTooltip';
    tip.className = 'heatmap-tooltip';
    document.body.appendChild(tip);
  }
  grid.querySelectorAll('.heatmap-cell').forEach(cell => {
    cell.addEventListener('mouseenter', e => {
      const seconds = parseInt(cell.dataset.seconds, 10);
      tip.textContent = seconds > 0 ? `${formatTime(seconds)} watched on ${cell.dataset.date}` : `No activity on ${cell.dataset.date}`;
      tip.style.display = 'block';
    });
    cell.addEventListener('mousemove', e => {
      tip.style.left = `${e.clientX + 12}px`;
      tip.style.top = `${e.clientY + 12}px`;
    });
    cell.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
  });

  // Save for the line view
  window._heatmapDays = days;
  buildLineGraph(days);
}

function buildLineGraph(days) {
  const svg = document.getElementById('heatmapLineSvg');
  if (!svg) return;

  // Only show the last 90 days on the line graph for readability
  const recent = days.slice(-90);
  const width = 900;
  const height = 160;
  const padding = { top: 10, right: 10, bottom: 20, left: 10 };
  const plotW = width - padding.left - padding.right;
  const plotH = height - padding.top - padding.bottom;
  const maxSeconds = Math.max(...recent.map(d => d.seconds), 1);

  const points = recent.map((d, i) => {
    const x = padding.left + (i / (recent.length - 1 || 1)) * plotW;
    const y = padding.top + plotH - (d.seconds / maxSeconds) * plotH;
    return { x, y, day: d };
  });

  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const areaPath = `${linePath} L ${points[points.length - 1].x.toFixed(1)} ${(padding.top + plotH).toFixed(1)} L ${points[0].x.toFixed(1)} ${(padding.top + plotH).toFixed(1)} Z`;

  // Month tick labels — show one label every ~14 days
  let tickLabels = '';
  for (let i = 0; i < points.length; i += 14) {
    const p = points[i];
    const label = p.day.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    tickLabels += `<text x="${p.x.toFixed(1)}" y="${height - 4}" class="heatmap-line-axis-label" text-anchor="middle">${label}</text>`;
  }

  const dots = points.map(p => `<circle class="heatmap-line-dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" data-date="${p.day.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}" data-seconds="${p.day.seconds}"></circle>`).join('');

  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svg.innerHTML = `
    <defs>
      <linearGradient id="lineGradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4ade80" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path class="heatmap-line-area" d="${areaPath}"></path>
    <path class="heatmap-line-path" d="${linePath}"></path>
    ${dots}
    ${tickLabels}
  `;

  let tip = document.getElementById('heatmapTooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'heatmapTooltip';
    tip.className = 'heatmap-tooltip';
    document.body.appendChild(tip);
  }
  svg.querySelectorAll('.heatmap-line-dot').forEach(dot => {
    dot.addEventListener('mouseenter', () => {
      const seconds = parseInt(dot.dataset.seconds, 10);
      tip.textContent = seconds > 0 ? `${formatTime(seconds)} watched on ${dot.dataset.date}` : `No activity on ${dot.dataset.date}`;
      tip.style.display = 'block';
    });
    dot.addEventListener('mousemove', e => {
      tip.style.left = `${e.clientX + 12}px`;
      tip.style.top = `${e.clientY + 12}px`;
    });
    dot.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
  });
}

function setActivityView(btn) {
  document.querySelectorAll('.activity-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const view = btn.dataset.view;
  const gridView = document.getElementById('heatmapGridView');
  const legend = document.getElementById('heatmapLegend');
  const lineView = document.getElementById('heatmapLineView');
  if (view === 'grid') {
    gridView.style.display = '';
    legend.style.display = '';
    lineView.style.display = 'none';
  } else {
    gridView.style.display = 'none';
    legend.style.display = 'none';
    lineView.style.display = '';
    if (window._heatmapDays) buildLineGraph(window._heatmapDays);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // Theme toggle
  const toggle = document.getElementById('themeToggle');
  if (toggle) {
    const saved = localStorage.getItem('aurum-theme') || 'dark';
    document.body.dataset.theme = saved;
    toggle.textContent = saved === 'dark' ? '☾' : '☀';
    toggle.addEventListener('click', () => {
      const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
      document.body.dataset.theme = next;
      localStorage.setItem('aurum-theme', next);
      toggle.textContent = next === 'dark' ? '☾' : '☀';
    });
  }
  loadStats();
});
</script>
