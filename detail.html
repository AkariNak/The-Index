<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aurum — Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="index.html">AURUM</a>
  <div class="topnav-right">
    <a href="https://ko-fi.com/aurumadmins" target="_blank" rel="noopener" class="kofi-btn">☕ <span>Support</span></a>
    <a id="accountLink" href="account.html" class="btn btn-outline btn-small" hidden>Account</a>
    <button id="signInNavBtn" type="button" class="btn btn-outline btn-small" style="display:none">Sign In</button>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
    <button id="adminLoginButton" type="button" class="admin-trigger">Admin</button>
  </div>
</nav>

<div class="page">
  <header class="detail-masthead">
    <a href="index.html" class="back-link">← Back to Aurum</a>
  </header>

  <main id="detailMain" class="detail-main">
    <div class="detail-loading">Loading…</div>
  </main>

  <section id="recommendationsSection" class="recs-section" hidden>
    <h2 class="recs-heading">You Might Also Like</h2>
    <div id="recsGrid" class="poster-grid"></div>
  </section>

  <footer class="site-foot">
    <span id="year"></span>
    <span>Aurum</span>
  </footer>
</div>

<dialog id="adminDialog" class="admin-dialog">
  <form id="adminLoginForm" method="dialog" class="admin-login">
    <h3>Admin Access</h3>
    <input id="adminEmailInput" type="email" placeholder="Email" autocomplete="username" required>
    <input id="adminPasswordInput" type="password" placeholder="Password" autocomplete="current-password" required>
    <p id="adminError" class="admin-error" hidden>Incorrect email or password.</p>
    <div class="admin-actions">
      <button type="button" id="adminCancelButton" class="btn btn-outline btn-small">Cancel</button>
      <button type="submit" class="btn btn-solid btn-small">Sign In</button>
    </div>
  </form>
</dialog>

<dialog id="authDialog" class="admin-dialog">
  <div class="admin-login" id="authDialogInner"></div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="core.js"></script>
<script src="detail.js"></script>
</body>
</html>
