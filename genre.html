<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Onyx</title>
<link rel="icon" type="image/png" href="favicon-256.png">
<link rel="apple-touch-icon" href="favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .genre-page-header {
    padding: 32px 0 20px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .genre-page-title {
    font-family: var(--display);
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--ink);
  }
  .genre-page-title span {
    color: var(--accent);
  }
  .genre-page-count {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    padding-bottom: 6px;
  }
  .genre-page-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 0 16px;
    max-width: 320px;
    width: 100%;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .genre-page-search:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .genre-page-search input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 11px 0;
    font-family: var(--body);
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .genre-page-search input::placeholder { color: var(--ink-mute); }
  .genre-page-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    margin-bottom: 64px;
  }
  .genre-page-empty {
    grid-column: 1/-1;
    padding: 64px 32px;
    text-align: center;
    font-family: var(--body);
    font-style: italic;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
  }
  .genre-nav-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .genre-nav-pill {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
    transition: all var(--transition);
  }
  .genre-nav-pill:hover { border-color: var(--accent); color: var(--accent-soft); }
  .genre-nav-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  @media (max-width: 600px) {
    .genre-page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .genre-page-search { max-width: 100%; }
    .genre-page-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
  }
</style>
</head>
<body>
<a class="skip-link" href="#genreGrid">Skip to main content</a>

<nav class="topnav">
  <a class="topnav-brand" href="index.html" aria-label="Onyx home">
    <svg viewBox="0 0 110 38" height="28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <text x="55" y="24" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="900" letter-spacing="6" fill="currentColor">ONYX</text>
      <line x1="8" y1="29" x2="102" y2="29" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="55" y="38" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="7" font-weight="400" letter-spacing="4" fill="#A0AABF">STREAMING</text>
    </svg>
  </a>
  <div class="topnav-right">
    <a href="index.html" class="btn btn-outline btn-small">← All Shows</a>
    <a id="accountLink" href="account.html" class="btn btn-outline btn-small" hidden>Account</a>
    <button id="signInNavBtn" type="button" class="btn btn-outline btn-small" style="display:none">Sign In</button>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
  </div>
</nav>

<div class="page">

  <div class="genre-page-header">
    <div>
      <h1 class="genre-page-title" id="pageTitle">Genre</h1>
      <div class="genre-page-count" id="pageCount"></div>
    </div>
    <div class="genre-page-search">
      <span class="topnav-search-icon">⌕</span>
      <input type="search" id="genreSearch" placeholder="Search…" autocomplete="off">
    </div>
  </div>

  <nav class="genre-nav-pills" id="genrePills" aria-label="Browse genres"></nav>

  <main id="genreGrid" class="genre-page-grid" aria-label="Shows"></main>

  <footer class="site-foot">
    <span id="year"></span>
    <span>Onyx</span>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="core.js"></script>
<script>
// ---- Theme ----
(function() {
  document.body.classList.toggle('light', localStorage.getItem('aurum-theme') === 'light');
  const btn = document.getElementById('themeToggle');
  if (btn) {
    btn.textContent = document.body.classList.contains('light') ? '☀' : '☾';
    btn.addEventListener('click', () => {
      const nowLight = !document.body.classList.contains('light');
      document.body.classList.toggle('light', nowLight);
      localStorage.setItem('aurum-theme', nowLight ? 'light' : 'dark');
      btn.textContent = nowLight ? '☀' : '☾';
    });
  }
  const yearEl = document.getElementById('year');
  if (yearEl) yearEl.textContent = '© ' + new Date().getFullYear();
})();

// ---- Genre definitions (mirrors index.js) ----
const GENRES = [
  { label: 'Action',          tags: ['action'] },
  { label: 'Adventure',       tags: ['adventure'] },
  { label: 'Fantasy',         tags: ['fantasy'] },
  { label: 'Romance',         tags: ['romance'] },
  { label: 'Comedy',          tags: ['comedy'] },
  { label: 'Drama',           tags: ['drama'] },
  { label: 'Sci-Fi',          tags: ['sci-fi'] },
  { label: 'Psychological',   tags: ['psychological'] },
  { label: 'Supernatural',    tags: ['supernatural'] },
  { label: 'Slice of Life',   tags: ['slice of life'] },
  { label: 'Horror',          tags: ['horror'] },
  { label: 'Mystery',         tags: ['mystery'] },
  { label: 'Isekai',          tags: ['isekai'] },
  { label: 'Thriller',        tags: ['thriller'] },
];

let _genreOverrides = {};
let _allGroups = [];
let _activeGenre = '';
let _query = '';

function getTagsForGroup(group) {
  const jikan = AppState.jikanCache[slug(group.title)];
  if (!jikan?.tags) return [];
  const DEMO = new Set(['shounen','seinen','shoujo','josei','kids']);
  return jikan.tags.filter(t => !DEMO.has(t.toLowerCase())).map(t => t.toLowerCase());
}

function groupMatchesGenre(group, tags) {
  const overrideGenres = _genreOverrides[group.slug] || [];
  if (overrideGenres.length) {
    return tags.every(t => overrideGenres.map(g => g.toLowerCase()).includes(t.toLowerCase()));
  }
  const groupTags = getTagsForGroup(group);
  if (!groupTags.length) return false;
  return tags.every(t => groupTags.includes(t));
}

function getGenreGroups(label) {
  const row = GENRES.find(g => g.label === label);
  if (!row) return _allGroups;
  return _allGroups.filter(g => groupMatchesGenre(g, row.tags));
}

function starsHtml(rating, count) {
  if (!rating || !count) return '';
  const full = Math.floor(rating);
  const half = (rating % 1) >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  const stars = '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
  return `<div class="poster-rating" title="${rating}/5">${stars} <span class="poster-rating-count">${rating.toFixed(1)}</span></div>`;
}

function posterCardHtml(group) {
  const cover = group.firstCover
    ? `<img src="${escapeHtml(group.firstCover)}" alt="${escapeHtml(group.title)}" loading="lazy">`
    : `<div class="cover-placeholder">${escapeHtml(group.title.charAt(0).toUpperCase())}</div>`;
  const epCount = group.videos.length;
  return `
    <article class="poster-card">
      <a class="poster-clickable" href="detail.html?show=${encodeURIComponent(group.slug)}">
        <div class="poster-cover">
          ${cover}
          <div class="poster-overlay"><span class="poster-play-icon">▶</span></div>
          <span class="poster-ep-badge">${epCount} ${epCount === 1 ? 'episode' : 'episodes'}</span>
        </div>
        <div class="poster-info">
          <div class="poster-cat">${escapeHtml((group.category || 'Other').toUpperCase())}</div>
          <h3 class="poster-title">${escapeHtml(group.title)}</h3>
        </div>
      </a>
    </article>
  `;
}

function render() {
  const grid = document.getElementById('genreGrid');
  const countEl = document.getElementById('pageCount');
  let groups = getGenreGroups(_activeGenre);
  if (_query) {
    const q = _query.toLowerCase();
    groups = groups.filter(g => g.title.toLowerCase().includes(q));
  }
  if (countEl) countEl.textContent = `${groups.length} ${groups.length === 1 ? 'show' : 'shows'}`;
  if (!groups.length) {
    grid.innerHTML = '<div class="genre-page-empty">No shows found.</div>';
    return;
  }
  grid.innerHTML = groups.map(posterCardHtml).join('');
}

function buildPills(activeLabel) {
  const container = document.getElementById('genrePills');
  if (!container) return;
  container.innerHTML = GENRES.map(g => {
    const count = _allGroups.filter(grp => groupMatchesGenre(grp, g.tags)).length;
    if (count < 1) return '';
    return `<a href="genre.html?genre=${encodeURIComponent(g.label)}" class="genre-nav-pill ${g.label === activeLabel ? 'active' : ''}">${escapeHtml(g.label)} <span style="opacity:.5">${count}</span></a>`;
  }).join('');
}

// ---- Bootstrap ----
(async function init() {
  await coreInit();
  _genreOverrides = await getGenreOverrides();
  _allGroups = applyHeroOrder(groupVideos(AppState.videos));

  // Read genre from URL
  const params = new URLSearchParams(window.location.search);
  _activeGenre = params.get('genre') || '';

  // Set page title
  const titleEl = document.getElementById('pageTitle');
  if (titleEl) {
    if (_activeGenre) {
      titleEl.innerHTML = `<span>${escapeHtml(_activeGenre)}</span>`;
      document.title = `${_activeGenre} — Onyx`;
    } else {
      titleEl.textContent = 'All Shows';
      document.title = 'All Shows — Onyx';
    }
  }

  buildPills(_activeGenre);
  render();

  // Search
  document.getElementById('genreSearch')?.addEventListener('input', e => {
    _query = e.target.value.trim();
    render();
  });

  // Nav auth
  const signInBtn = document.getElementById('signInNavBtn');
  const accountLink = document.getElementById('accountLink');
  getCurrentUser().then(user => {
    if (user) { if (signInBtn) signInBtn.style.display = 'none'; if (accountLink) accountLink.hidden = false; }
    else { if (signInBtn) { signInBtn.style.display = ''; signInBtn.onclick = () => window.location.href = 'account.html'; } if (accountLink) accountLink.hidden = true; }
  });

  // Fetch Jikan tags in background
  const seenBase = new Set();
  for (const g of _allGroups) {
    const base = g.title.replace(/\s+season\s+\d+/i,'').replace(/\s+part\s+\d+/i,'').replace(/\s+S\d+$/i,'').trim();
    if (seenBase.has(base)) continue;
    seenBase.add(base);
    if (AppState.jikanCache[slug(g.title)]) continue;
    try {
      await fetchJikanDetails(g.title);
      render();
      await new Promise(r => setTimeout(r, 600));
    } catch { /* silent */ }
  }
  render();
})();
</script>
<script src="feedback.js"></script>
<script src="font-switcher.js"></script>
</body>
</html>
