<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum — Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .player-page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px 32px 80px;
    }
    .player-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .player-nav a {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color .15s;
    }
    .player-nav a:hover { color: var(--accent); }
    .player-nav .nav-divider { color: var(--line); font-size: 11px; }
    .player-nav .nav-show {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }
    .player-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      align-items: start;
    }
    .video-wrap {
      width: 100%;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,150,58,0.1);
      margin-bottom: 20px;
    }
    .video-wrap video {
      width: 100%;
      display: block;
      max-height: 72vh;
      background: #000;
    }
    .player-info { padding: 0 2px; }
    .player-ep-meta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin-bottom: 8px;
    }
    .player-title {
      font-family: var(--display);
      font-size: clamp(16px, 2vw, 24px);
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 10px;
      color: var(--ink);
      letter-spacing: 0.04em;
    }
    .player-desc {
      font-family: var(--body);
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.6;
      margin: 0 0 20px;
    }
    .show-info-block {
      border-top: 1px solid var(--line);
      padding-top: 20px;
      margin-top: 4px;
    }
    .show-info-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    #showTitle {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--ink);
      letter-spacing: 0.04em;
    }
    #showMeta {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }
    #showSynopsis {
      font-family: var(--body);
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.6;
      margin: 0 0 14px;
    }
    #tagList { display: flex; flex-wrap: wrap; gap: 6px; }
    #recsSection {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }
    #recsSection h3 {
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      margin: 0 0 16px;
      font-weight: 600;
    }
    #recsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
    }
    .player-sidebar { position: sticky; top: 88px; }
    .sidebar-head {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 2px;
    }
    #episodeSidebar {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }
    #episodeSidebar::-webkit-scrollbar { width: 3px; }
    #episodeSidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
    .sidebar-ep {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 12px 14px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      transition: background .12s;
    }
    .sidebar-ep:hover { background: var(--paper-2); }
    .sidebar-ep.active { background: var(--accent); }
    .sidebar-ep.active .sidebar-ep-num { color: rgba(0,0,0,0.6); }
    .sidebar-ep.active .sidebar-ep-title { color: #000; }
    .sidebar-ep-num {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }
    .sidebar-ep-title {
      font-family: var(--body);
      font-size: 13px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @media (max-width: 900px) {
      .player-page { padding: 16px 16px 64px; }
      .player-layout { grid-template-columns: 1fr; }
      #episodeSidebar { max-height: 300px; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a class="topnav-brand" href="index.html">AURUM</a>
    <div class="topnav-right">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
    </div>
  </nav>

  <div class="player-page">
    <nav class="player-nav">
      <a href="index.html">← Aurum</a>
      <span class="nav-divider">/</span>
      <a id="backLink" href="index.html">Show page</a>
      <span class="nav-divider">/</span>
      <span class="nav-show" id="navShowTitle">Loading…</span>
    </nav>

    <div class="player-layout">
      <div class="player-main">
        <div class="video-wrap">
          <video
            id="playerVideo"
            controls
            controlsList="nodownload noremoteplayback"
            disablePictureInPicture
          ></video>
        </div>
        <div class="player-info">
          <div class="player-ep-meta" id="playerEpMeta"></div>
          <h1 class="player-title" id="playerTitle">Loading…</h1>
          <p class="player-desc" id="playerDesc" hidden></p>
        </div>
        <div class="show-info-block">
          <div class="show-info-label">From the collection</div>
          <h2 id="showTitle"></h2>
          <div id="showMeta" hidden></div>
          <p id="showSynopsis" hidden></p>
          <div id="tagList" hidden></div>
        </div>
        <section id="recsSection" hidden>
          <h3>You Might Also Like</h3>
          <div id="recsGrid" class="poster-grid"></div>
        </section>
      </div>

      <aside class="player-sidebar">
        <div class="sidebar-head">Episodes</div>
        <div id="episodeSidebar"></div>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="core.js"></script>
  <script src="player.js"></script>
  <script>
    // Wire theme toggle on player page
    const _tt = document.getElementById('themeToggle');
    if (_tt) {
      _tt.addEventListener('click', () => {
        const nowLight = !document.body.classList.contains('light');
        document.body.classList.toggle('light', nowLight);
        localStorage.setItem('the-index-theme', nowLight ? 'light' : 'dark');
        _tt.textContent = nowLight ? '☀' : '☾';
      });
      _tt.textContent = document.body.classList.contains('light') ? '☀' : '☾';
    }
    // Sync nav title
    const _st = document.getElementById('showTitle');
    const _nt = document.getElementById('navShowTitle');
    if (_st && _nt) {
      new MutationObserver(() => { _nt.textContent = _st.textContent; })
        .observe(_st, { childList: true, subtree: true, characterData: true });
    }
  </script>
</body>
</html>
