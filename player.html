<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onyx</title>
  <link rel="icon" type="image/png" href="favicon-256.png">
  <link rel="apple-touch-icon" href="favicon-256.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .player-page { max-width: 1500px; margin: 0 auto; padding: 24px 32px 80px; }

    .player-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .player-nav a {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.15s;
    }
    .player-nav a:hover { color: var(--accent); }
    .player-nav .nav-div { color: var(--line); }
    .player-nav .nav-show {
      font-family: var(--display);
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      align-items: start;
    }

    .video-wrap {
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,150,58,0.1);
      margin-bottom: 12px;
    }
    .video-wrap video {
      width: 100%;
      display: block;
      max-height: 72vh;
      background: #000;
    }


    /* Auto-hide cursor and controls */
    .video-wrap.cursor-hidden {
      cursor: none;
    }
    .video-wrap.cursor-hidden video {
      cursor: none;
    }
    .video-controls-bar {
      transition: opacity 0.3s ease;
    }
    .video-controls-bar.controls-hidden {
      opacity: 0;
      pointer-events: none;
    }
    /* Fog / cinema mode */
    .video-controls-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 6px 0 14px;
    }
    .fog-control { display: flex; align-items: center; gap: 8px; }
    .fog-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }
    .fog-swatch {
      width: 26px; height: 26px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 50%;
      cursor: pointer;
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .fog-swatch:hover { border-color: var(--accent); }
    .fog-swatch::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: var(--fog-swatch-color, transparent);
      border: 1px solid rgba(0,0,0,0.3);
      display: var(--fog-swatch-show, none);
    }
    .fog-swatch.active::after { display: block; }
    .fog-input { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    .fog-off-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-mute);
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color 0.15s, border-color 0.15s;
    }
    .fog-off-btn:hover { color: var(--ink); border-color: var(--ink-soft); }

    /* Timestamp tooltip */
    .video-container {
      position: relative;
    }
    .video-timestamp-tip {
      position: absolute;
      bottom: 48px;
      background: rgba(0,0,0,0.82);
      color: #fff;
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      pointer-events: none;
      transform: translateX(-50%);
      white-space: nowrap;
      display: none;
      z-index: 10;
    }

    /* Player info */
    .player-info { padding: 0 2px; }
    .player-ep-meta { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }
    .player-title { font-family: var(--display); font-size: clamp(16px, 2vw, 22px); font-weight: 700; line-height: 1.2; margin: 0 0 10px; color: var(--ink); letter-spacing: 0.04em; }
    .player-desc { font-family: var(--body); font-size: 14px; color: var(--ink-soft); line-height: 1.6; margin: 0 0 20px; }

    .show-info-block { border-top: 1px solid var(--line); padding-top: 20px; margin-top: 8px; }
    .show-info-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    #showTitle { font-family: var(--display); font-size: 17px; font-weight: 700; margin: 0 0 6px; color: var(--ink); letter-spacing: 0.04em; }
    #showMeta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--ink-soft); margin-bottom: 12px; }
    #showSynopsis { font-family: var(--body); font-size: 14px; color: var(--ink-soft); line-height: 1.6; margin: 0 0 14px; }
    #tagList { display: flex; flex-wrap: wrap; gap: 6px; }

    #recsSection { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--line); }
    #recsSection h3 { font-family: var(--display); font-size: 14px; font-weight: 600; letter-spacing: 0.06em; color: var(--ink-soft); margin: 0 0 16px; }
    #recsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 14px; }

    /* Sidebar */
    .player-sidebar { position: sticky; top: 88px; }
    .sidebar-head { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); padding-bottom: 10px; border-bottom: 1px solid var(--line); margin-bottom: 2px; }
    #episodeSidebar {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }
    #episodeSidebar::-webkit-scrollbar { width: 3px; }
    #episodeSidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

    .sidebar-ep {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 11px 14px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      transition: background 0.12s;
    }
    .sidebar-ep:hover { background: var(--paper-2); }
    .sidebar-ep.active { background: var(--accent); }
    .sidebar-ep.active .sidebar-ep-num, .sidebar-ep.active .sidebar-ep-title { color: #000; }
    .sidebar-ep-num { font-family: var(--mono); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }
    .sidebar-ep-title { font-family: var(--body); font-size: 13px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    @media (max-width: 900px) {
      .player-page { padding: 16px 16px 64px; }
      .player-layout { grid-template-columns: 1fr; }
      #episodeSidebar { max-height: 280px; }
    }
    @media (max-width: 600px) {
      .player-page { padding: 12px 12px 48px; }
    }

    /* Theater mode */
    body.theater-mode { overflow: hidden; }
    body.theater-mode::before {
      content: '';
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9990;
    }
    body.theater-mode .video-wrap {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      width: 90vw !important;
      max-width: 1400px !important;
      z-index: 9991 !important;
      background: #000;
    }
    body.theater-mode .video-wrap video {
      width: 100% !important;
      height: auto !important;
      aspect-ratio: 16/9 !important;
      display: block !important;
    }
    body.theater-mode .video-controls-bar {
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 9992 !important;
      background: rgba(0,0,0,0.85) !important;
      padding: 8px 20px !important;
    }
    .theater-exit-hint {
      display: none;
      position: fixed;
      top: 16px;
      right: 20px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      z-index: 9993;
      pointer-events: none;
    }
    body.theater-mode .theater-exit-hint { display: block; }

    /* Focus button */
    .focus-control { display: flex; align-items: center; }
    .focus-btn {
      font-family: var(--mono, monospace);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute, #5A6480);
      background: transparent;
      border: 1px solid var(--line, #2A3050);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .focus-btn:hover { color: var(--accent, #3B82F6); border-color: var(--accent, #3B82F6); }
    .focus-btn.active {
      color: var(--accent, #3B82F6);
      border-color: var(--accent, #3B82F6);
      background: rgba(59,130,246,0.1);
    }
  </style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

<nav class="topnav">

      <span class="global-search-icon">⌕</span>

  <nav class="player-nav">

    <span class="nav-div">/</span>
    <a id="backLink" href="index.html">Show</a>
    <span class="nav-div">/</span>

  </nav>

  <div class="player-layout">

    <div class="player-main">
      <div class="video-wrap">
        <div class="video-container">
          <video id="playerVideo" controls controlsList="nodownload noremoteplayback" disablePictureInPicture onkeydown="if(event.key==='ArrowLeft'||event.key==='ArrowRight'){event.preventDefault();}"></video>
          <div class="video-timestamp-tip" id="timestampTip"></div>
        </div>
      </div>
      <div class="video-controls-bar">
        <div class="focus-control">
          <button type="button" id="focusBtn" class="focus-btn">Focus Mode</button>
        </div>
      </div>

      <div id="playerSeriesContainer" class="player-series-container" hidden>
        <div class="player-series-label">More from This Series</div>
        <div class="player-series-grid" id="playerSeriesGrid"></div>
      </div>
      <div class="player-info">
        <div class="player-ep-meta" id="playerEpMeta"></div>
        <h1 class="player-title" id="playerTitle">Loading…</h1>
        <p class="player-desc" id="playerDesc" hidden></p>
      </div>
      <div class="show-info-block">
        <div class="show-info-label">From the collection</div>
        <h2 id="showTitle"></h2>
        <div id="showMeta" hidden></div>
        <p id="showSynopsis" hidden></p>
        <div id="tagList" hidden></div>
      </div>
      <section id="recsSection" hidden>
        <h3>You Might Also Like</h3>

        <div id="commentsContainer"></div>
      </section>
    </div>

    <aside class="player-sidebar">
      <div class="sidebar-head">Episodes</div>
      <div id="episodeSidebar"></div>
    </aside>

  </div>
</div>

<div class="theater-exit-hint">ESC to exit focus mode</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="core.js"></script>
<script src="player.js"></script>
<script>
  // Theme toggle
  const _tt = document.getElementById('themeToggle');
  if (_tt) {
    _tt.textContent = document.body.classList.contains('light') ? '☀' : '☾';
    _tt.addEventListener('click', () => {
      const nowLight = !document.body.classList.contains('light');
      document.body.classList.toggle('light', nowLight);
      localStorage.setItem('aurum-theme', nowLight ? 'light' : 'dark');
      _tt.textContent = nowLight ? '☀' : '☾';
    });
  }

  // Unified controls + timestamp tip show/hide
  let hideAll = () => {};
  (function() {
    const wrap  = document.querySelector('.video-wrap');
    const bar   = document.querySelector('.video-controls-bar');
    const video = document.getElementById('playerVideo');
    const tip   = document.getElementById('timestampTip');
    if (!wrap || !bar || !video) return;
    let hideTimer   = null;
    let hideInterval = null;

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    function _hideAll() {
      wrap.classList.add('cursor-hidden');
      bar.classList.add('controls-hidden');
      video.removeAttribute('controls');
      video.blur();
      if (tip) { tip.style.display = 'none'; }
    }
    hideAll = _hideAll;

    function showControls() {
      wrap.classList.remove('cursor-hidden');
      bar.classList.remove('controls-hidden');
      video.setAttribute('controls', '');
      if (hideInterval) { clearInterval(hideInterval); hideInterval = null; }
      clearTimeout(hideTimer);
      hideTimer = setTimeout(_hideAll, 2500);
    }

    wrap.addEventListener('mousemove', e => {
      showControls();
      if (!tip) return;
      const videoEl = document.getElementById('playerVideo');
      if (!videoEl || !videoEl.duration) { tip.style.display = 'none'; return; }
      const rect = videoEl.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (y >= rect.height * 0.82 && y <= rect.height && x >= 0 && x <= rect.width) {
        const pct = Math.max(0, Math.min(1, x / rect.width));
        tip.textContent = formatTime(pct * videoEl.duration);
        tip.style.display = 'block';
        tip.style.left = `${x}px`;
      } else {
        tip.style.display = 'none';
      }
    });

    wrap.addEventListener('mouseenter', showControls);
    wrap.addEventListener('mouseleave', () => { if (tip) tip.style.display = 'none'; });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') showControls();
    });

    video.addEventListener('play', showControls);
    video.addEventListener('pause', showControls);
    video.addEventListener('seeked', showControls);
  })();
  document.addEventListener('keydown', e => {
    if (!playerVideoEl) return;
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    switch (e.key) {
      case 'f': case 'F':
        e.preventDefault();
        if (document.fullscreenElement) document.exitFullscreen();
        else playerVideoEl.requestFullscreen?.();
        break;
      case 'k':
        e.preventDefault();
        playerVideoEl.paused ? playerVideoEl.play() : playerVideoEl.pause();
        break;
      case 'l':
        e.preventDefault();
        playerVideoEl.currentTime = Math.min(playerVideoEl.duration || 0, playerVideoEl.currentTime + 5);
        break;
      case 'j':
        e.preventDefault();
        playerVideoEl.currentTime = Math.max(0, playerVideoEl.currentTime - 5);
        break;
      case 'ArrowRight':
        e.preventDefault();
        playerVideoEl.currentTime = Math.min(playerVideoEl.duration || 0, playerVideoEl.currentTime + 5);
        break;
      case 'ArrowLeft':
        e.preventDefault();
        playerVideoEl.currentTime = Math.max(0, playerVideoEl.currentTime - 5);
        break;
    }
  });

  // Re-hide controls when entering/exiting fullscreen
  document.addEventListener('fullscreenchange', () => {
    const video = document.getElementById('playerVideo');
    const wrap  = document.querySelector('.video-wrap');
    if (document.fullscreenElement && video) {
      video.addEventListener('mousemove', _fsMouseMove);
      video.addEventListener('mouseleave', _fsTipHide);
      setTimeout(hideAll, 2500);
    } else if (video) {
      video.removeEventListener('mousemove', _fsMouseMove);
      video.removeEventListener('mouseleave', _fsTipHide);
    }
  });

  function _fsTipHide() {
    const tip = document.getElementById('timestampTip');
    if (tip) tip.style.display = 'none';
  }

  function _fsMouseMove(e) {
    if (!document.fullscreenElement) return;
    const wrap = document.querySelector('.video-wrap');
    const bar  = document.querySelector('.video-controls-bar');
    const video = document.getElementById('playerVideo');
    const tip   = document.getElementById('timestampTip');
    if (!wrap || !bar || !video) return;

    // Show controls
    wrap.classList.remove('cursor-hidden');
    bar.classList.remove('controls-hidden');
    video.setAttribute('controls', '');
    clearTimeout(window._fsHideTimer);
    window._fsHideTimer = setTimeout(hideAll, 2500);

    // Timestamp tip
    if (!tip || !video.duration) { if (tip) tip.style.display = 'none'; return; }
    const rect = video.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    if (y >= rect.height * 0.82 && y <= rect.height && x >= 0 && x <= rect.width) {
      const h = Math.floor(video.duration * (x / rect.width) / 3600);
      const total = video.duration * (x / rect.width);
      const m = Math.floor((total % 3600) / 60);
      const sec = Math.floor(total % 60);
      tip.textContent = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
      tip.style.display = 'block';
      tip.style.left = `${x}px`;
    } else {
      tip.style.display = 'none';
    }
  }

  // Cache Akari Admin status on load, then use it synchronously in contextmenu
  let _isAkariAdmin = false;
  getCurrentUser().then(async user => {
    if (user) {
      const profile = await getCurrentProfile();
      _isAkariAdmin = profile?.username === 'Akari Admin';
    }
  });

  document.addEventListener('contextmenu', e => {
    if (e.target.tagName !== 'VIDEO') return;
    if (_isAkariAdmin) return;
    e.preventDefault();
  });

  // Focus / theater mode
  (function() {
    const btn = document.getElementById('focusBtn');
    if (!btn) return;

    function enableFocus() {
      document.body.classList.add('theater-mode');
      btn.classList.add('active');
      btn.textContent = 'Exit Focus';
    }

    function disableFocus() {
      document.body.classList.remove('theater-mode');
      btn.classList.remove('active');
      btn.textContent = 'Focus Mode';
    }

    btn.addEventListener('click', () => {
      document.body.classList.contains('theater-mode') ? disableFocus() : enableFocus();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.body.classList.contains('theater-mode')) disableFocus();
    });

    document.addEventListener('click', e => {
      if (!document.body.classList.contains('theater-mode')) return;
      const wrap = document.querySelector('.video-wrap');
      const bar = document.querySelector('.video-controls-bar');
      if (!wrap?.contains(e.target) && !bar?.contains(e.target) && e.target !== btn) {
        disableFocus();
      }
    });
  })();

  const _st = document.getElementById('showTitle');
  const _nt = document.getElementById('navShowTitle');
  if (_st && _nt) {
    new MutationObserver(() => { _nt.textContent = _st.textContent; }).observe(_st, { childList: true, subtree: true, characterData: true });
  }

  // Nav auth
  try {
    getCurrentUser().then(user => {
      const signIn = document.getElementById('signInNavBtn');
      const acct   = document.getElementById('accountLink');
      if (user) { if (signIn) signIn.style.display = 'none'; if (acct) acct.hidden = false; }
      else { if (signIn) { signIn.style.display = ''; signIn.onclick = () => window.location.href = 'account.html'; } if (acct) acct.hidden = true; }
    });
  } catch(e) {}
</script>
<script src="feedback.js"></script>
<script src="font-switcher.js"></script>
</body>
