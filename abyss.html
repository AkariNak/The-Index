<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Onyx — Abyss</title>
<link rel="icon" type="image/png" href="favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#dc2626;--red-dim:rgba(220,38,38,0.12);--red-mid:rgba(220,38,38,0.4);
  --paper:#070508;--paper2:#0d080c;--paper3:#130b10;
  --ink:#f8f8f8;--ink-soft:#9ca3af;--ink-mute:#374151;
  --mono:'Share Tech Mono',monospace;--vt:'VT323','Share Tech Mono',monospace;
  --display:'Syne',sans-serif;
}
html,body{background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}
.skip-link{position:absolute;top:-100%;left:16px;background:var(--red);color:#fff;padding:8px 16px;font-family:var(--mono);font-size:12px;z-index:9999;text-decoration:none}
.skip-link:focus{top:8px}

@keyframes scanmove{0%{top:-4px}100%{top:100%}}
@keyframes flicker{0%,100%{opacity:1}91%{opacity:1}92%{opacity:.5}93%{opacity:1}96%{opacity:.8}97%{opacity:1}}
@keyframes blink{0%,100%{opacity:1}49%{opacity:1}50%{opacity:0}}
@keyframes redpulse{0%,100%{box-shadow:0 0 4px rgba(220,38,38,0.2)}50%{box-shadow:0 0 16px rgba(220,38,38,0.5)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-3px)}20%{transform:translateX(3px)}30%{transform:translateX(-2px)}40%{transform:translateX(2px)}50%{transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitchslide{0%,100%{clip-path:inset(0 0 100% 0);transform:translateX(0)}33%{clip-path:inset(15% 0 60% 0);transform:translateX(-5px)}66%{clip-path:inset(60% 0 15% 0);transform:translateX(5px)}}
@keyframes glitchslide2{0%,100%{clip-path:inset(0 0 100% 0);transform:translateX(0)}33%{clip-path:inset(40% 0 30% 0);transform:translateX(4px)}66%{clip-path:inset(20% 0 55% 0);transform:translateX(-4px)}}
@keyframes vhsline{0%{transform:translateY(0)}100%{transform:translateY(600px)}}
@keyframes cardglitch{0%,95%,100%{transform:translateX(0)}96%{transform:translateX(-2px)}97%{transform:translateX(2px)}98%{transform:translateX(0)}}

.scanline-wrap{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
.scanline{position:absolute;left:0;right:0;height:3px;background:rgba(255,255,255,0.025);animation:scanmove 5s linear infinite}
.crt-lines{position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:99}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 45%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:98}

/* MAIN */
#mainPage{display:block;min-height:100vh;animation:fadeIn .6s ease}
.void-nav{display:flex;align-items:center;gap:14px;padding:10px 24px;border-bottom:1px solid rgba(220,38,38,0.2);background:rgba(7,5,8,0.95);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);animation:flicker 12s infinite}
.void-brand{font-family:var(--vt);font-size:28px;color:var(--red);letter-spacing:.2em;line-height:1;position:relative;text-decoration:none}
.void-brand::before{content:'ABYSS';position:absolute;inset:0;color:#3b82f6;animation:glitchslide 4s infinite;opacity:.5}
.void-brand::after{content:'ABYSS';position:absolute;inset:0;color:#22c55e;animation:glitchslide2 4s infinite .3s;opacity:.4}
.void-tag{font-family:var(--mono);font-size:8px;color:#7f1d1d;border:1px solid #7f1d1d;padding:2px 8px;letter-spacing:.2em;text-transform:uppercase}
.void-nav-right{margin-left:auto;display:flex;gap:16px;align-items:center}
.void-nav-link{font-family:var(--mono);font-size:9px;color:var(--ink-mute);letter-spacing:.15em;text-transform:uppercase;text-decoration:none;cursor:pointer;background:none;border:none}
.void-nav-link:hover{color:var(--red)}
.void-nav-link.main{color:var(--ink-soft)}
.void-nav-link.main:hover{color:var(--ink)}

/* HERO */
.void-hero{position:relative;height:clamp(280px,46vw,580px);max-height:620px;overflow:hidden;background:var(--paper2);border-bottom:1px solid rgba(220,38,38,0.15);margin:0 0 28px}
.void-hero-bg{position:absolute;inset:-60px;background-size:cover;background-position:center;filter:brightness(.25) saturate(.5) blur(18px);transform:scale(1.15)}
.void-hero-bg-sharp{position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat;filter:brightness(.4) saturate(.5);opacity:.6;}
.void-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(220,38,38,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(220,38,38,0.04) 1px,transparent 1px);background-size:48px 48px}
.void-hero-vhs{position:absolute;left:0;right:0;height:4px;background:rgba(220,38,38,0.15);animation:vhsline 6s linear infinite;pointer-events:none}
.void-hero-content{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:28px 32px;background:linear-gradient(to top,rgba(7,5,8,0.98) 0%,rgba(7,5,8,0.55) 50%,transparent 100%)}
.void-hero-eyebrow{font-family:var(--mono);font-size:9px;color:#7f1d1d;letter-spacing:.3em;text-transform:uppercase;margin-bottom:6px}
.void-hero-title{font-family:var(--display);font-size:clamp(20px,3.5vw,48px);font-weight:800;color:var(--ink);letter-spacing:-.02em;margin-bottom:6px}
.void-hero-meta{font-family:var(--mono);font-size:10px;color:var(--ink-mute);letter-spacing:.1em}
.void-hero-btn{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--ink);background:var(--red-dim);border:1px solid var(--red-mid);padding:7px 20px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.void-hero-btn:hover{background:rgba(220,38,38,0.25)}

/* SECTIONS */
.void-section{padding:20px 24px 0}
.void-section-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.void-section-label{font-family:var(--mono);font-size:9px;color:#7f1d1d;letter-spacing:.3em;text-transform:uppercase;white-space:nowrap}
.void-section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(220,38,38,0.25),transparent)}

/* CARDS */
.void-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:0 24px 20px}
.void-card{background:var(--paper2);border:1px solid rgba(220,38,38,0.12);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;animation:cardglitch 8s infinite}
.void-card:nth-child(2n){animation-delay:.4s}
.void-card:nth-child(3n){animation-delay:.9s}
.void-card:hover{border-color:rgba(220,38,38,0.45);transform:translateY(-2px)}
.void-card-img{aspect-ratio:2/3;position:relative;overflow:hidden;background:var(--paper3)}
.void-card-cover{width:100%;height:100%;object-fit:cover;filter:saturate(.35) contrast(1.15) brightness(.65)}
.void-card-glitch{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0;transition:opacity .1s}
.void-card:hover .void-card-glitch{opacity:1}
.void-card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#110810,#0d060c)}
.void-card-placeholder-text{font-family:var(--vt);font-size:20px;color:#1f1014;letter-spacing:.2em}
.void-card-info{padding:7px 8px}
.void-card-title{font-family:var(--mono);font-size:10px;color:#d1d5db;letter-spacing:.02em;line-height:1.4}
.void-card-meta{font-family:var(--mono);font-size:9px;color:var(--ink-mute);margin-top:2px;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.void-card-lang{font-size:8px;color:#7f1d1d;border:1px solid #7f1d1d;padding:1px 5px;letter-spacing:.1em;text-transform:uppercase}

/* STATUS */

.void-hero { cursor:pointer; }
.void-hero:hover .void-hero-title { }
.abyss-dot { width:14px;height:3px;background:#1f1014;border-radius:2px;cursor:pointer;transition:all .2s; }
.abyss-dot.active { width:20px;background:#dc2626; }
.abyss-dot:hover { background:rgba(220,38,38,0.5); }
@keyframes heroFadeIn { from{opacity:0} to{opacity:1} }
.hero-fade { animation:heroFadeIn .5s ease; }

.abyss-cw-card{flex-shrink:0;width:140px}
.abyss-cw-img{position:relative;aspect-ratio:2/3;border:1px solid rgba(220,38,38,0.2);border-radius:4px;overflow:hidden;cursor:pointer}
.abyss-cw-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:#1f1014}
.abyss-cw-hover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;background:rgba(0,0,0,0.5)}
.abyss-cw-img:hover .abyss-cw-hover{opacity:1}
.abyss-cw-remove{position:absolute;top:4px;right:4px;background:rgba(7,5,8,0.8);border:1px solid rgba(220,38,38,0.4);color:#dc2626;font-size:10px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;opacity:0;transition:opacity .2s;padding:0}
.abyss-cw-img:hover .abyss-cw-remove{opacity:1}
.abyss-cw-title{font-family:var(--mono);font-size:9px;color:#6b7280;margin-top:4px;letter-spacing:.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#abyssContinueGrid{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.abyss-chip{font-family:var(--mono);font-size:9px;color:#4b5563;background:transparent;border:1px solid #1f1014;padding:4px 12px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.abyss-chip.active,.abyss-chip:hover{color:#dc2626;border-color:rgba(220,38,38,0.4);background:rgba(220,38,38,0.08)}
.void-statusbar{font-family:var(--mono);font-size:9px;color:#1f1014;letter-spacing:.12em;border-top:1px solid rgba(220,38,38,0.08);padding:7px 24px;display:flex;justify-content:space-between;margin-top:8px}
</style>
</head>

<!-- ABYSS ADMIN -->
<div id="abyssAdmin" style="display:none;padding:20px 24px;border-top:1px solid rgba(220,38,38,0.1)">

<script>
const GLITCH_CHARS='▓░╗╬Ω∆█╪▒╝╔╠╣║⌂∂∑∏∫Φ∀∃▸◂▴▾■□▪◘◙';
function randChar(){return GLITCH_CHARS[Math.floor(Math.random()*GLITCH_CHARS.length)]}
function corruptText(el,real,dur=120,intensity=0.7){
  let f=0;const max=8;
  const id=setInterval(()=>{
    if(f>=max){el.textContent=real;clearInterval(id);return;}
    el.textContent=real.split('').map(c=>c===' '?' ':Math.random()<intensity?randChar():c).join('');
    f++;
  },dur/max);
}

const SUPABASE_URL='https://eosnuxttjchckprpymnw.supabase.co';
const SUPABASE_KEY='sb_publishable_QSDQxkMRbxn1M4m5L5sB6w_auxSAZVg';
let _sb=null;
function getSB(){if(_sb)return _sb;_sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);return _sb;}

function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

function groupVideos(videos){
  const map={};
  videos.forEach(v=>{
    const key=slug(v.collection);
    if(!map[key])map[key]={slug:key,title:v.collection,videos:[],firstCover:v.cover_url||'',dateAdded:v.date_added||'',abyssCategory:v.abyss_category||''};
    map[key].videos.push(v);
    if(!map[key].firstCover&&v.cover_url)map[key].firstCover=v.cover_url;
  });
  return Object.values(map).sort((a,b)=>{
    const aD=Math.max(...a.videos.map(v=>new Date(v.created_at||v.date_added||0).getTime()));
    const bD=Math.max(...b.videos.map(v=>new Date(v.created_at||v.date_added||0).getTime()));
    return bD-aD;
  });
}

function buildCard(group){
  const card=document.createElement('div');
  card.className='void-card';
  card.setAttribute('tabindex','0');
  card.setAttribute('role','button');
  card.setAttribute('aria-label',group.title);
  const lang=group.videos[0]?.language||'';
  const langBadge=lang==='subbed'?'<span class="void-card-lang">Subbed</span>':'';
  const coverHtml=group.firstCover
    ?`<img src="${group.firstCover}" alt="${group.title} cover" class="void-card-cover" loading="lazy">`
    :`<div class="void-card-placeholder"><div class="void-card-placeholder-text" aria-hidden="true">▓</div></div>`;
  card.innerHTML=`
    <div class="void-card-img">
      ${coverHtml}
      <div class="void-card-glitch" style="top:${20+Math.random()*60}%"></div>
    </div>
    <div class="void-card-info">
      <div class="void-card-title">${group.title}</div>
      <div class="void-card-meta">${group.videos.length} eps ${langBadge}</div>
    </div>`;
  card.addEventListener('mouseenter',()=>corruptText(card.querySelector('.void-card-title'),group.title,300,0.6));
  card.addEventListener('click',()=>{sessionStorage.setItem('fromAbyss','1');const s=slug(group.title);window.location.href=`detail.html?show=${encodeURIComponent(s)}`;});
  card.addEventListener('keydown',e=>{if(e.key==='Enter')card.click();});
  return card;
}

function fillGrid(id,groups){
  const g=document.getElementById(id);
  if(!g)return;
  g.innerHTML='';
  if(!groups.length){g.innerHTML='<div style="font-family:monospace;font-size:10px;color:#374151;padding:8px 0;letter-spacing:.1em">NO DATA FOUND</div>';return;}
  groups.forEach(gr=>g.appendChild(buildCard(gr)));
}

async function loadVoidShows(){
  try{
    let all=[];let from=0;const ps=1000;
    while(true){
      const{data,error}=await getSB().from('videos').select('*').eq('void',true).order('date_added',{ascending:false}).range(from,from+ps-1);
      if(error)throw error;
      if(!data||!data.length)break;
      all=all.concat(data);
      if(data.length<ps)break;
      from+=ps;
    }
    return all;
  }catch(e){console.warn('Void load error:',e);return[];}
}

const CATEGORY_ORDER = [
  'psychological horror',
  'extreme violence',
  'mature & explicit',
  'dark thriller',
];

let _allGroups = [];
let _activeLang = 'all';

function setLang(btn){
  document.querySelectorAll('.abyss-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _activeLang = btn.dataset.lang;
  renderAllSections();
}

function filterGroups(groups){
  if(_activeLang==='all') return groups;
  return groups.filter(g=>g.videos[0]?.language===_activeLang);
}

function renderAllSections(){
  const filtered = filterGroups(_allGroups);
  fillGrid('recentGrid', filtered.slice(0,6));
  fillGrid('allGrid', [...filtered].sort((a,b)=>a.title.localeCompare(b.title)));

  const catContainer = document.getElementById('categoryRows');
  catContainer.innerHTML = '';

  const catMap = {};
  filtered.forEach(g=>{
    const cat = g.videos[0]?.abyss_category || '';
    if(!cat) return;
    const key = cat.toLowerCase().trim();
    if(!catMap[key]) catMap[key]=[];
    catMap[key].push(g);
  });

  const orderedKeys = [...CATEGORY_ORDER.filter(k=>catMap[k]), ...Object.keys(catMap).filter(k=>!CATEGORY_ORDER.includes(k))];

  orderedKeys.forEach(cat=>{
    const groups = catMap[cat];
    if(!groups||!groups.length) return;
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="void-section">
        <div class="void-section-head">
          <div class="void-section-label">// ${cat}</div>
          <div class="void-section-line"></div>
        </div>
      </div>
      <div class="void-grid" id="catGrid_${cat.replace(/[^a-z0-9]/g,'')}"></div>`;
    catContainer.appendChild(section);
    fillGrid('catGrid_'+cat.replace(/[^a-z0-9]/g,''), groups);
  });
}

async function buildGrids(){
  const all=await loadVoidShows();
  if(!all.length){
    document.getElementById('allGrid').innerHTML='<div style="font-family:monospace;font-size:10px;color:#374151;padding:24px;letter-spacing:.1em">ABYSS IS EMPTY · NO SHOWS LOADED YET</div>';
    return;
  }
  _allGroups = groupVideos(all);
  renderAllSections();
  initAbyssHero(_allGroups);
  renderAbyssContinueWatching(_allGroups);
  document.getElementById('statusCount').textContent=`${_allGroups.length} SHOWS · ${all.length} EPS`;
}

function startPassiveCorruption(){
  const els=[
    {id:'navCorrupt',real:'DARK SECTOR'},{id:'heroBtn',real:'▶ WATCH NOW'},
    {id:'label1',real:'// recently added'},{id:'label2',real:'// all shows'},{id:'navCorrupt',real:'DARK SECTOR'},
  ];
  function corrupt(){
    const el=els[Math.floor(Math.random()*els.length)];
    const dom=document.getElementById(el.id);
    if(dom)corruptText(dom,el.real,400,0.65);

  }
  setTimeout(corrupt,1200);
}






// ---- ANILIST BANNER FETCH ----
const ANILIST_BASE = 'https://graphql.anilist.co';
const _bannerCache = {};

async function fetchAbyssBanner(title){
  const key = title.toLowerCase().replace(/[^a-z0-9]+/g,'-');
  if(_bannerCache[key]) return _bannerCache[key];
  const gql = `query ($s: String) { Media(search: $s, type: ANIME, sort: SEARCH_MATCH) { bannerImage coverImage { extraLarge } } }`;
  try {
    const res = await fetch(ANILIST_BASE, {
      method:'POST',
      headers:{'Content-Type':'application/json',Accept:'application/json'},
      body:JSON.stringify({query:gql,variables:{s:title}})
    });
    if(!res.ok) return null;
    const json = await res.json();
    const media = json?.data?.Media;
    const result = { banner: media?.bannerImage||null, cover: media?.coverImage?.extraLarge||null };
    _bannerCache[key] = result;
    return result;
  } catch(e){ return null; }
}

async function fetchBannersForHero(groups){
  for(const g of groups.slice(0,6)){
    const data = await fetchAbyssBanner(g.title);
    if(data?.banner) g._banner = data.banner;
    else if(data?.cover) g._banner = g.firstCover;
  }
}


// ---- ABYSS CONTINUE WATCHING ----
async function renderAbyssContinueWatching(groups){
  const section = document.getElementById('abyssContinue');
  const grid = document.getElementById('abyssContinueGrid');
  if(!section||!grid) return;
  try {
    const sb = getSB();
    const { data: { user } } = await sb.auth.getUser();
    if(!user){ section.style.display='none'; return; }
    const { data: wl } = await sb.from('watch_status').select('*').eq('user_id', user.id).eq('status','watching');
    if(!wl||!wl.length){ section.style.display='none'; return; }
    const cards = wl.map(w => {
      const g = groups.find(g => g.title === w.collection);
      if(!g) return null;
      const cover = g.firstCover
        ? `<img src="${g.firstCover}" alt="${g.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;filter:saturate(.4) brightness(.7)">`
        : `<div style="width:100%;height:100%;background:#130b10;display:flex;align-items:center;justify-content:center;font-family:var(--vt);font-size:36px;color:#1f1014">▓</div>`;
      const epIdx = 0;
      const pct = Math.round(((epIdx+1)/g.videos.length)*100);
      return `
      <div class="abyss-cw-card" data-collection="${g.title}">
        <div class="abyss-cw-img" onclick="sessionStorage.setItem('fromAbyss','1');window.location.href='player.html?show=${encodeURIComponent(slug(g.title))}&ep=${epIdx}'">
          ${cover}
          <div class="abyss-cw-progress"><div style="height:100%;width:${pct}%;background:#dc2626"></div></div>
          <div class="abyss-cw-hover"><span style="color:#dc2626;font-size:24px">▶</span></div>
          <button class="abyss-cw-remove" onclick="event.stopPropagation();removeAbyssCW(this)" title="Remove">✕</button>
        </div>
        <div class="abyss-cw-title">${g.title}</div>
      </div>`;
    }).filter(Boolean);
    if(!cards.length){ section.style.display='none'; return; }
    section.style.display='block';
    grid.innerHTML = cards.join('');
  } catch(e){ section.style.display='none'; }
}

async function removeAbyssCW(btn){
  const card = btn.closest('.abyss-cw-card');
  const collection = card?.dataset.collection;
  if(!collection) return;
  try {
    const sb = getSB();
    const { data:{ user } } = await sb.auth.getUser();
    if(!user) return;
    await sb.from('watch_status').delete().eq('user_id', user.id).eq('collection', collection);
    card.remove();
    const grid = document.getElementById('abyssContinueGrid');
    if(!grid?.children.length) document.getElementById('abyssContinue').style.display='none';
  } catch(e){ console.warn(e); }
}

// ---- ABYSS HERO SLIDESHOW ----
let _heroGroups = [];
let _heroIdx = 0;
let _heroTimer = null;
const HERO_INTERVAL = 6000;

async function initAbyssHero(groups){
  _heroGroups = groups.slice(0, 6);
  if(!_heroGroups.length) return;
  buildHeroDots();
  showHeroSlide(0);
  _heroTimer = setInterval(()=>{ showHeroSlide((_heroIdx+1)%_heroGroups.length); }, HERO_INTERVAL);
  // Fetch banners in background and update slides as they arrive
  fetchBannersForHero(_heroGroups).then(()=>{ showHeroSlide(_heroIdx); });

  // Hover to corrupt title
  const heroEl = document.getElementById('abyssHero');
  const titleEl = document.getElementById('heroTitle');
  heroEl?.addEventListener('mouseenter', ()=>{
    const real = _heroGroups[_heroIdx]?.title || '';
    corruptText(titleEl, real, 350, 0.65);
  });
  heroEl?.addEventListener('mouseleave', ()=>{
    const real = _heroGroups[_heroIdx]?.title || '';
    titleEl.textContent = real;
  });
}

function buildHeroDots(){
  const dots = document.getElementById('heroDots');
  if(!dots) return;
  dots.innerHTML = '';
  _heroGroups.forEach((g, i) => {
    const d = document.createElement('div');
    d.className = 'abyss-dot' + (i===0?' active':'');
    d.onclick = (e) => { e.stopPropagation(); clearInterval(_heroTimer); showHeroSlide(i); _heroTimer=setInterval(()=>showHeroSlide((_heroIdx+1)%_heroGroups.length),HERO_INTERVAL); };
    dots.appendChild(d);
  });
}

function showHeroSlide(idx){
  if(!_heroGroups.length) return;
  _heroIdx = idx;
  const g = _heroGroups[idx];
  const titleEl = document.getElementById('heroTitle');
  const metaEl  = document.getElementById('heroMeta');
  const bgEl    = document.getElementById('heroBg');
  const btnEl   = document.getElementById('heroBtn');

  // Corrupt title in, then show real
  corruptText(titleEl, g.title, 400, 0.8);
  metaEl.className = 'void-hero-meta hero-fade';
  metaEl.textContent = `${g.videos.length} eps · ${g.videos[0]?.language||'dubbed'}`;
  const bgUrl = g._banner || g.firstCover;
  if(bgUrl){
    bgEl.style.backgroundImage = `url('${bgUrl}')`;
    const sharpEl = document.getElementById('heroBgSharp');
    if(sharpEl) sharpEl.style.backgroundImage = `url('${bgUrl}')`;
  }
  btnEl.onclick = ()=>{ sessionStorage.setItem('fromAbyss','1'); window.location.href=`detail.html?show=${encodeURIComponent(slug(g.title))}`; };
  document.getElementById('abyssHero').onclick = (e)=>{ if(e.target===btnEl||e.target.closest('.abyss-dot')) return; btnEl.click(); };

  // Update dots
  document.querySelectorAll('.abyss-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

// --- ABYSS ADMIN ---
const ADMIN_PASS = 'onyx-admin';
let _abyssAdminUnlocked = false;

function initAbyssAdmin(){
  const panel = document.getElementById('abyssAdmin');
  const showSel = document.getElementById('abyssShowSelect');
  const catSel = document.getElementById('abyssCatSelect');
  const saveBtn = document.getElementById('abyssCatSave');
  const clearBtn = document.getElementById('abyssCatClear');
  const status = document.getElementById('abyssCatStatus');
  if(!panel) return;

  // Populate show dropdown from loaded groups
  if(showSel && _allGroups.length){
    showSel.innerHTML = '<option value="">-- Select a show --</option>' +
      [..._allGroups].sort((a,b)=>a.title.localeCompare(b.title))
        .map(g=>`<option value="${g.slug}">${g.title}</option>`).join('');
  }

  saveBtn?.addEventListener('click', async ()=>{
    const s = showSel.value;
    const cat = catSel.value;
    if(!s||!cat){status.textContent='Select a show and category.';return;}
    const group = _allGroups.find(g=>g.slug===s);
    if(!group){status.textContent='Show not found.';return;}
    const {error} = await getSB().from('videos').update({abyss_category:cat}).eq('collection',group.title);
    if(error){status.textContent='Error: '+error.message;return;}
    group.videos.forEach(v=>v.abyss_category=cat);
    status.textContent = 'Saved: '+group.title+' → '+cat;
    renderAllSections();
  });

  clearBtn?.addEventListener('click', async ()=>{
    const s = showSel.value;
    if(!s){status.textContent='Select a show first.';return;}
    const group = _allGroups.find(g=>g.slug===s);
    if(!group) return;
    const {error} = await getSB().from('videos').update({abyss_category:null}).eq('collection',group.title);
    if(error){status.textContent='Error: '+error.message;return;}
    group.videos.forEach(v=>v.abyss_category=null);
    status.textContent = 'Cleared: '+group.title;
    renderAllSections();
  });
}

document.getElementById('abyssAdminBtn')?.addEventListener('click', ()=>{
  const pass = prompt('// ADMIN ACCESS');
  if(pass===ADMIN_PASS){
    _abyssAdminUnlocked=true;
    document.getElementById('abyssAdmin').style.display='block';
    initAbyssAdmin();
  }
});
