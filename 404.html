<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Aurum</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="favicon-256.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .not-found-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    gap: 16px;
  }
  .not-found-code {
    font-family: var(--display);
    font-size: clamp(80px, 15vw, 160px);
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.08em;
    line-height: 1;
    margin: 0;
    opacity: 0.15;
  }
  .not-found-title {
    font-family: var(--display);
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--ink);
    margin: -24px 0 0;
  }
  .not-found-sub {
    font-family: var(--body);
    font-style: italic;
    color: var(--ink-soft);
    font-size: 16px;
    max-width: 38ch;
    line-height: 1.6;
    margin: 0;
  }
  .not-found-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .not-found-divider {
    width: 48px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="index.html">AURUM</a>
  <div class="topnav-right">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
  </div>
</nav>

<div class="not-found-page">
  <p class="not-found-code">404</p>
  <h1 class="not-found-title">Lost in the Abyss</h1>
  <div class="not-found-divider"></div>
  <p class="not-found-sub">The page you're looking for doesn't exist or was moved.</p>
  <div class="not-found-actions">
    <a href="index.html" class="btn btn-solid">Back to Aurum</a>
    <a href="index.html#search" class="btn btn-outline">Browse Shows</a>
  </div>
</div>

<script>
  (function() {
    document.body.classList.toggle('light', localStorage.getItem('aurum-theme') === 'light');
    const btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = document.body.classList.contains('light') ? '☀' : '☾';
      btn.addEventListener('click', () => {
        const nowLight = !document.body.classList.contains('light');
        document.body.classList.toggle('light', nowLight);
        localStorage.setItem('aurum-theme', nowLight ? 'light' : 'dark');
        btn.textContent = nowLight ? '☀' : '☾';
      });
    }
  })();
</script>
</body>
</html>
